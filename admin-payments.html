<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อนุมัติการชำระเงิน | Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { margin:0; padding:20px; box-sizing:border-box; }
        .admin-wrap { max-width:900px; margin:0 auto; }

        /* Header */
        .adm-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.08); }
        .adm-title { font-size:1.5rem; font-weight:800; }
        .adm-title small { display:block; font-size:0.82rem; font-weight:400; color:var(--text-muted); margin-top:2px; }

        /* Stats */
        .stats-row { display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px; }
        .stat-card { background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px;text-align:center; }
        .stat-num { font-size:1.6rem;font-weight:800;font-family:'Outfit',sans-serif; }
        .stat-lbl { color:var(--text-muted);font-size:0.75rem;margin-top:2px; }

        /* Filters */
        .filter-row { display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:8px; -webkit-overflow-scrolling: touch; }
        .filter-btn { flex:0 0 auto; padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);font-size:0.85rem;cursor:pointer;transition:all 0.2s;white-space:nowrap; }
        .filter-btn.active,.filter-btn:hover { background:rgba(255,51,102,0.15);border-color:rgba(255,51,102,0.4);color:#FF3366; }

        /* Payment cards */
        .pay-list { display:flex;flex-direction:column;gap:20px; }
        .pay-item { background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:20px;transition:border-color 0.2s; position:relative; }
        .pay-item.pending { border-left:4px solid #F59E0B; }
        .pay-item.approved { border-left:4px solid #4ade80; }
        
        .pay-item-header { display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px; }
        .pay-item-info { flex:1; }
        .pay-ref { font-size:0.75rem;color:var(--text-muted);font-family:monospace;margin-bottom:4px; }
        .pay-contact-name { font-weight:800;font-size:1.1rem; color: #fff; }
        .pay-tier { display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:20px;font-size:0.75rem;font-weight:700;margin-top:4px; }
        .tier-std { background:linear-gradient(135deg,#FF336622,#9333EA22);color:#c084fc;border:1px solid rgba(147,51,234,0.3); }
        .tier-ext { background:linear-gradient(135deg,#F59E0B22,#EF444422);color:#fbbf24;border:1px solid rgba(245,158,11,0.3); }

        .pay-status { white-space:nowrap;}
        .status-badge { display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:0.78rem;font-weight:700; }
        .status-pending { background:rgba(245,158,11,0.15);color:#F59E0B;border:1px solid rgba(245,158,11,0.3); }
        .status-approved { background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.3); }
        .status-rejected { background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.3); }

        .pay-details { display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top: 16px; padding:12px; background:rgba(255,255,255,0.03); border-radius:12px; }
        .pay-detail-item { font-size:0.85rem; }
        .pay-detail-label { color:var(--text-muted);font-size:0.75rem;margin-bottom:2px; }

        /* Slip image */
        .slip-img { width:100%;max-height:350px;object-fit:contain;border-radius:14px; margin: 16px 0; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .no-slip { padding:16px;text-align:center;color:var(--text-muted);font-size:0.82rem;background:rgba(255,255,255,0.02);border-radius:10px;border:1px dashed rgba(255,255,255,0.08);margin-bottom:12px; }

        /* Action buttons */
        .action-row { display:flex; flex-direction: column; gap:10px; }
        .action-btn { width:100%; height: 50px; border-radius:14px; border:none; cursor:pointer; font-size:0.95rem; font-weight:700; font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; }
        .btn-approve { background:rgba(74,222,128,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.3); }
        .btn-reject { background:rgba(248,113,113,0.1);color:#f87171;border:1px solid rgba(248,113,113,0.2); }
        .btn-view-slip { background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.1); }

        /* Uid input for approval */
        .uid-input { width:100%; padding: 14px; font-size: 1rem; margin-bottom: 12px; border: 2px solid rgba(74,222,128,0.3); border-radius:12px; background:rgba(74,222,128,0.05); color:white; outline:none; }
        .uid-input::placeholder { color:rgba(255,255,255,0.25); }

        /* Lightbox & Spinner */
        #lightbox { position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;display:none;align-items:center;justify-content:center; }
        #lightbox.show { display:flex; }
        #lightbox img { max-width:95%;max-height:95%;border-radius:12px; }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed; inset: 0; background: rgba(8, 8, 8, 0.9);
            backdrop-filter: blur(15px); z-index: 9999;
            display: none; align-items: center; justify-content: center; flex-direction: column;
            gap: 24px; animation: fadeIn 0.3s ease;
        }
        .loader-ring {
            width: 80px; height: 80px; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .loader-ring::before {
            content: ""; position: absolute; inset: 0;
            border-radius: 50%; border: 4px solid rgba(255, 51, 102, 0.1);
            border-top: 4px solid #FF3366;
            animation: spin 1s linear infinite;
        }
        #loading-text { font-weight: 700; font-size: 1.2rem; color: white; text-align: center; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader-ring"></div>
        <div id="loading-text">กำลังประมวลผล...</div>
    </div>
    <!-- Lightbox for slip images -->
    <div id="lightbox" onclick="document.getElementById('lightbox').classList.remove('show')">
        <img id="lightbox-img" src="" alt="Slip">
    </div>

    <div class="admin-wrap">
        <div class="adm-header">
            <div>
                <div class="adm-title">
                    💳 อนุมัติการชำระเงิน
                    <small>Surprise Me — Payment Manager</small>
                </div>
            </div>
            <a href="index.html" class="btn-secondary" style="padding:8px 16px;font-size:0.82rem;">
                <span class="material-symbols-rounded">home</span> หน้าหลัก
            </a>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-num" id="count-pending" style="color:#F59E0B">-</div>
                <div class="stat-lbl">⏳ รอตรวจสอบ</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="count-approved" style="color:#4ade80">-</div>
                <div class="stat-lbl">✅ อนุมัติแล้ว</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="count-revenue" style="color:#c084fc">฿-</div>
                <div class="stat-lbl">💰 รายได้รวม</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-row">
            <button class="filter-btn active" onclick="filterPayments('all', this)">ทั้งหมด</button>
            <button class="filter-btn" onclick="filterPayments('pending', this)">⏳ รอตรวจ</button>
            <button class="filter-btn" onclick="filterPayments('approved', this)">✅ อนุมัติ</button>
            <button class="filter-btn" onclick="filterPayments('rejected', this)">❌ ปฏิเสธ</button>
            <button class="filter-btn" onclick="filterPayments('extreme', this)">👑 Extreme</button>
            <button class="filter-btn" onclick="filterPayments('standard', this)">⭐ Standard</button>
        </div>

        <!-- Payment List -->
        <div class="pay-list" id="payList">
            <div class="empty-state">
                <span class="material-symbols-rounded">pending</span>
                กำลังโหลดรายการ...
            </div>
        </div>
    </div>

    <script type="module">
        import { db, storage } from './firebase-config.js';
        import {
            collection, query, orderBy, onSnapshot,
            doc, updateDoc, serverTimestamp, setDoc, getDoc
        } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

        // ─── ADMIN UIDs — ใส่ UID ผู้ดูแลระบบตรงนี้ ───────────────
        const ADMIN_UIDS = ['qqzXIApGiHVh2r78spN1BeZ7Qzz2'];
        // ─────────────────────────────────────────────────────────────

        let allPayments = [];
        let currentFilter = 'all';

        // Local helper for template literals
        const escHtml = (str = '') => {
            return str.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        };
        window.escHtml = escHtml; // Also expose to window if needed

        const auth = getAuth();
        onAuthStateChanged(auth, user => {
            if (!user) { alert('กรุณาล็อกอินก่อน'); location.href = 'index.html'; return; }
            // Optional: check admin
            if (!ADMIN_UIDS.includes(user.uid)) { alert('ไม่มีสิทธิ์เข้าถึงหน้าผู้ดูแลระบบ'); location.href = 'index.html'; return; }
        });

        // Realtime listener on payments
        import { limit } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        const q = query(collection(db, 'payments'), orderBy('createdAt', 'desc'), limit(50));
        onSnapshot(q, snap => {
            allPayments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            updateStats();
            renderList(currentFilter);
        });

        function updateStats() {
            const pending = allPayments.filter(p => p.status === 'pending').length;
            const approved = allPayments.filter(p => p.status === 'approved').length;
            const revenue = allPayments.filter(p => p.status === 'approved').reduce((s, p) => s + (p.amount || 0), 0);
            document.getElementById('count-pending').textContent = pending;
            document.getElementById('count-approved').textContent = approved;
            document.getElementById('count-revenue').textContent = '฿' + revenue.toLocaleString();
        }

        window.filterPayments = (f, btn) => {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderList(f);
        };

        function renderList(filter) {
            let list = allPayments;
            if (filter !== 'all') {
                if (['standard', 'extreme'].includes(filter)) {
                    list = allPayments.filter(p => p.tier === filter);
                } else {
                    list = allPayments.filter(p => p.status === filter);
                }
            }

            const container = document.getElementById('payList');
            if (list.length === 0) {
                container.innerHTML = `<div class="empty-state"><span class="material-symbols-rounded">inbox</span>ไม่มีรายการ</div>`;
                return;
            }

            container.innerHTML = list.map(p => {
                const dateStr = p.createdAt?.toDate
                    ? p.createdAt.toDate().toLocaleString('th-TH', { dateStyle:'short', timeStyle:'short' })
                    : 'ไม่ระบุ';

                const statusMap = {
                    pending:  `<span class="status-badge status-pending"><span class="material-symbols-rounded" style="font-size:0.85rem;">schedule</span> รอตรวจสอบ</span>`,
                    approved: `<span class="status-badge status-approved"><span class="material-symbols-rounded" style="font-size:0.85rem;">check_circle</span> อนุมัติแล้ว</span>`,
                    rejected: `<span class="status-badge status-rejected"><span class="material-symbols-rounded" style="font-size:0.85rem;">cancel</span> ปฏิเสธ</span>`,
                };

                const tierBadge = p.tier === 'extreme'
                    ? `<span class="pay-tier tier-ext">👑 EXTREME ฿120</span>`
                    : `<span class="pay-tier tier-std">⭐ Standard ฿20</span>`;

                const slipSection = p.slipUrl
                    ? `<div>
                        <div style="position:relative;">
                            <img src="${p.slipUrl}" class="slip-img" alt="Slip" 
                                 loading="lazy"
                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
                                 onclick="showLightbox('${p.slipUrl}')">
                            <div style="display:none; padding:20px; text-align:center; background:rgba(255,51,102,0.1); border-radius:12px; margin:10px 0;">
                                <span class="material-symbols-rounded" style="color:#FF3366; font-size:2rem;">broken_image</span>
                                <div style="font-size:0.85rem; color:#FF3366; margin-top:8px;">รูปภาพโหลดไม่ได้ (ลองกดลิงก์ด้านล่างแทน)</div>
                            </div>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:12px;">
                            <div style="display:flex; gap:8px;">
                                <a href="${p.slipUrl}" target="_blank" class="btn-view-slip" style="flex:1; text-decoration:none; padding:10px; border-radius:12px; font-size:0.82rem; display:flex; align-items:center; justify-content:center; gap:6px;">
                                    <span class="material-symbols-rounded" style="font-size:1.1rem;">open_in_new</span> เปิดรูปในหน้าต่างใหม่
                                </a>
                                <button onclick="copyToClipboard('${p.slipUrl}', this)" class="btn-view-slip" style="padding:10px 14px; border-radius:12px; display:flex; align-items:center; gap:6px;">
                                    <span class="material-symbols-rounded" style="font-size:1.1rem;">content_copy</span> คัดลอกลิงก์
                                </button>
                            </div>
                            <input type="text" value="${p.slipUrl}" readonly onclick="this.select()" 
                                   style="width:100%; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.05); padding:8px 12px; border-radius:10px; font-size:0.7rem; color:var(--accent); font-family:monospace; cursor:text;" 
                                   title="ลิงก์รูปภาพสลิป">
                        </div>
                       </div>`
                    : `<div class="no-slip"><span class="material-symbols-rounded" style="font-size:1.2rem;vertical-align:middle;">image_not_supported</span> ไม่มีรูปสลิป</div>`;

                const approvedInfo = p.status === 'approved'
                    ? `<div style="padding:10px 14px;background:rgba(74,222,128,0.07);border:1px solid rgba(74,222,128,0.2);border-radius:10px;font-size:0.8rem;color:#4ade80;margin-bottom:10px;">
                        <span class="material-symbols-rounded" style="font-size:0.85rem;vertical-align:middle;">check_circle</span>
                        เปิดสิทธิ์ให้แล้ว ${p.approvedAt?.toDate ? '· ' + p.approvedAt.toDate().toLocaleString('th-TH',{dateStyle:'short',timeStyle:'short'}) : ''}
                      </div>` : '';

                const actionBtns = p.status === 'pending' ? `
                    <div style="margin-bottom:10px;">
                        <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:6px;">UID ของผู้ใช้ (จาก Firebase Auth หรือเว็บ)</div>
                        <input type="text" class="uid-input" id="uid-${p.id}" placeholder="UID ผู้ใช้ (ถ้ามี หรือใส่ email)"
                               value="${p.uid || p.userEmail || ''}">
                    </div>
                    <div class="action-row">
                        <button class="action-btn btn-approve" onclick="approvePayment('${p.id}', '${p.tier}')">
                            <span class="material-symbols-rounded" style="font-size:0.9rem;">check_circle</span> อนุมัติ + เปิดสิทธิ์
                        </button>
                        <button class="action-btn btn-reject" onclick="rejectPayment('${p.id}')">
                            <span class="material-symbols-rounded" style="font-size:0.9rem;">cancel</span> ปฏิเสธ
                        </button>
                        ${p.slipUrl ? `<button class="action-btn btn-view-slip" onclick="showLightbox('${p.slipUrl}')"><span class="material-symbols-rounded" style="font-size:0.9rem;">open_in_new</span> ขยายสลิป</button>` : ''}
                    </div>` : `
                    <div class="action-row">
                        ${p.slipUrl ? `<button class="action-btn btn-view-slip" onclick="showLightbox('${p.slipUrl}')"><span class="material-symbols-rounded" style="font-size:0.9rem;">image</span> ดูสลิป</button>` : ''}
                        ${p.status === 'approved' ? `<button class="action-btn btn-reject" onclick="rejectPayment('${p.id}')"><span class="material-symbols-rounded" style="font-size:0.9rem;">undo</span> ยกเลิกสิทธิ์</button>` : ''}
                    </div>`;

                return `
                    <div class="pay-item ${p.status}">
                        <div class="pay-item-header">
                            <div class="pay-item-info">
                                <div class="pay-ref">📄 ${p.id}</div>
                                <div class="pay-contact-name">${escHtml(p.contact || '—')}</div>
                                ${tierBadge}
                            </div>
                            <div class="pay-status">${statusMap[p.status] || ''}</div>
                        </div>
                        <div class="pay-details">
                            <div class="pay-detail-item"><div class="pay-detail-label">จำนวนเงิน</div><strong>฿${p.amount || '?'}</strong></div>
                            <div class="pay-detail-item"><div class="pay-detail-label">Email/UID</div>${escHtml(p.userEmail || p.uid || '—')}</div>
                            <div class="pay-detail-item"><div class="pay-detail-label">วันที่</div>${dateStr}</div>
                            <div class="pay-detail-item"><div class="pay-detail-label">หมายเหตุ</div>${escHtml(p.note || '—')}</div>
                        </div>
                        ${slipSection}
                        ${approvedInfo}
                        ${actionBtns}
                    </div>
                `;
            }).join('');
        }

        window.approvePayment = async (payId, tier) => {
            const uidInput = document.getElementById('uid-' + payId);
            const uid = uidInput?.value?.trim();
            if (!uid) { alert('กรุณาระบุ UID หรือ Email ของผู้ใช้ก่อนอนุมัติ'); uidInput?.focus(); return; }
            if (!confirm(`อนุมัติการชำระเงินและเปิดสิทธิ์ ${tier.toUpperCase()} ให้ ${uid}?`)) return;

            const overlay = document.getElementById('loading-overlay');
            const loadText = document.getElementById('loading-text');

            try {
                overlay.style.display = 'flex';
                loadText.textContent = "กำลังบันทึกการอนุมัติ...";

                // 1. Update payment status
                await updateDoc(doc(db, 'payments', payId), {
                    status: 'approved',
                    approvedAt: serverTimestamp(),
                    approvedUid: uid,
                });

                // 2. Set user tier in Firestore users collection
                loadText.textContent = "กำลังอัปเดตยศผู้ใช้...";
                await setDoc(doc(db, 'users', uid), {
                    tier,
                    tierApprovedAt: serverTimestamp(),
                    tierPaymentId: payId,
                }, { merge: true });

                overlay.style.display = 'none';
                alert(`✅ อนุมัติแล้ว! เปิดสิทธิ์ ${tier.toUpperCase()} ให้ ${uid} สำเร็จ`);
            } catch(err) {
                overlay.style.display = 'none';
                alert('❌ Error: ' + err.message);
            }
        };

        window.rejectPayment = async (payId) => {
            if (!confirm('ยืนยันปฏิเสธการชำระเงินนี้?')) return;
            const overlay = document.getElementById('loading-overlay');
            try {
                overlay.style.display = 'flex';
                document.getElementById('loading-text').textContent = "กำลังยกเลิกรายการ...";
                await updateDoc(doc(db, 'payments', payId), { status: 'rejected', rejectedAt: serverTimestamp() });
                overlay.style.display = 'none';
            } catch(err) {
                overlay.style.display = 'none';
                alert('Error: ' + err.message);
            }
        };

        window.showLightbox = (url) => {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox').classList.add('show');
        };

        window.copyToClipboard = async (text, btn) => {
            try {
                await navigator.clipboard.writeText(text);
                const original = btn.innerHTML;
                btn.innerHTML = '<span class="material-symbols-rounded" style="color:#4ade80; font-size:1.1rem;">check</span> คัดลอกแล้ว';
                btn.style.borderColor = '#4ade8055';
                btn.style.background = '#4ade8011';
                setTimeout(() => {
                    btn.innerHTML = original;
                    btn.style.borderColor = '';
                    btn.style.background = '';
                }, 2000);
            } catch (err) {
                alert('ไม่สามารถคัดลอกได้: ' + err.message);
            }
        };
    </script>
</body>
</html>
