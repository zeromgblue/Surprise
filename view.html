<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เปิดเซอร์ไพรส์ | Surprise Me</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; overflow-x:hidden; }

        /* Loading */
        #loading-screen { position:fixed; inset:0; background:var(--background); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; gap:16px; transition:opacity 0.5s ease; }
        #loading-screen.out { opacity:0; pointer-events:none; }
        .load-ring { width:40px; height:40px; border:2px solid rgba(255,255,255,0.1); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Intro screen */
        #intro-screen { display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; max-width:480px; width:100%; gap:0; }
        #intro-screen.show { display:flex; animation:fadeInUp 0.6s ease; }

        .envelope-box {
            width: 140px; height: 140px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 32px; cursor: pointer; position: relative;
            transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(255,255,255,0.15);
        }
        .envelope-box::before {
            content: ''; position: absolute; inset: -10px; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: rotateGlow 4s linear infinite; pointer-events: none; z-index: 0;
        }
        @keyframes rotateGlow { to { transform: rotate(360deg); } }
        
        .envelope-box .material-symbols-rounded { font-size: 4rem; font-variation-settings: 'FILL' 1; color: white; position: relative; z-index: 1; }
        
        /* Variants */
        .box-shake { animation: boxShake 3s ease-in-out infinite; }
        @keyframes boxShake { 0%,100% { transform:rotate(0); } 5%,15%,25%,35% { transform:rotate(-5deg) scale(1.05); } 10%,20%,30% { transform:rotate(5deg) scale(1.05); } 40% { transform:rotate(0) scale(1); } }
        
        .box-beat { animation: heartBeat 1.5s ease-in-out infinite; }
        @keyframes heartBeat { 0%,100% { transform:scale(1); } 15% { transform:scale(1.15); } 30% { transform:scale(1); } 45% { transform:scale(1.15); } 60% { transform:scale(1); } }

        .intro-tag { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); margin-bottom:12px; }
        .intro-title { font-size:1.6rem; font-weight:800; font-family:'Outfit',sans-serif; margin-bottom:6px; }
        .intro-from { color:var(--text-muted); font-size:0.9rem; margin-bottom:32px; }
        .tap-pill {
            display:inline-flex; align-items:center; gap:8px;
            padding:10px 24px; border-radius:50px;
            background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
            font-size:0.85rem; color:var(--text-muted);
            animation:pulseTap 2s ease-in-out infinite;
            cursor:pointer;
        }
        @keyframes pulseTap { 0%,100% { opacity:0.5; } 50% { opacity:1; } }

        /* Viewer */
        #viewer { display:none; width:100%; max-width:540px; padding:20px; }
        #viewer.show { display:block; animation:fadeInUp 0.5s ease; }

        .view-card { border-radius:24px; overflow:hidden; position:relative; }
        .view-card-inner { padding:36px 32px; position:relative; z-index:1; }
        @media (max-width:480px) { .view-card-inner { padding:24px 20px; } }

        .view-tag { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; opacity:0.6; margin-bottom:20px; display:flex; align-items:center; gap:6px; }
        .view-to { font-size:0.82rem; opacity:0.6; margin-bottom:6px; }
        .view-name { font-size:2rem; font-weight:800; font-family:'Outfit',sans-serif; margin-bottom:28px; line-height:1.1; }
        @media (max-width:400px) { .view-name { font-size:1.6rem; } }
        .view-message { font-size:1rem; line-height:1.9; white-space:pre-wrap; word-break:break-word; min-height:80px; }
        .view-message.typewriter::after { content:'|'; animation:blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .view-from { font-weight:700; font-size:0.9rem; margin-top:32px; opacity:0; transform:translateY(10px); transition:all 0.5s ease; }
        .view-from.show { opacity:0.8; transform:translateY(0); }
        .view-divider { height:1px; background:rgba(255,255,255,0.1); margin:24px 0; }
        .view-meta { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; opacity:0; transition:opacity 0.5s ease; }
        .view-meta.show { opacity:1; }
        .view-count-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-radius:50px; padding:4px 12px; font-size:0.75rem; color:rgba(255,255,255,0.5); }
        .create-own-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border-radius:50px; border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.6); font-size:0.8rem; text-decoration:none; transition:all 0.2s ease; background:rgba(255,255,255,0.04); }
        .create-own-btn:hover { background:rgba(255,255,255,0.1); color:white; }

        .interact-btn {
            width:100%; margin-top:20px; padding:13px;
            border-radius:14px; border:1px solid rgba(255,255,255,0.15);
            background:rgba(255,255,255,0.06); color:white;
            font-size:0.9rem; font-weight:600; cursor:pointer;
            transition:all 0.2s ease; display:flex; align-items:center; justify-content:center; gap:8px;
            font-family:'Inter',sans-serif;
        }
        .interact-btn:hover { background:rgba(255,255,255,0.12); }

        /* Particles */
        .particle { position:fixed; pointer-events:none; z-index:9999; animation:floatUp linear forwards; }
        @keyframes floatUp { 0% { transform:translateY(0) scale(1) rotate(0deg); opacity:1; } 100% { transform:translateY(-60vh) scale(0.3) rotate(180deg); opacity:0; } }

        /* Special states */
        .state-card { text-align:center; padding:60px 24px; }
        .state-icon { width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
        .state-icon .material-symbols-rounded { font-size:1.8rem; }
        .state-title { font-size:1.3rem; font-weight:700; margin-bottom:8px; }
        .state-desc { color:var(--text-muted); font-size:0.9rem; line-height:1.7; max-width:320px; margin:0 auto 24px; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="load-ring"></div>
        <p style="color:var(--text-muted); font-size:0.85rem;">กำลังโหลด...</p>
    </div>

    <div id="intro-screen"></div>
    <div id="viewer"></div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        import { getTemplateById } from './templates-data.js';

        const $ = id => document.getElementById(id);
        const urlParams = new URLSearchParams(window.location.search);
        const surpriseId = urlParams.get('id');
        let surpriseData = null;
        let tpl = null;

        async function init() {
            if (!surpriseId) { showState('not-found', 'ไม่พบเซอร์ไพรส์', 'ลิงก์ไม่ถูกต้องหรือไม่มี ID ของเซอร์ไพรส์'); return; }
            try {
                const docRef = doc(db, 'surprises', surpriseId);
                const snap = await getDoc(docRef);
                if (!snap.exists()) { showState('not-found', 'ไม่พบเซอร์ไพรส์', 'อาจถูกลบแล้ว หรือลิงก์ไม่ถูกต้อง'); return; }
                surpriseData = snap.data();
                tpl = getTemplateById(surpriseData.template);

                if (surpriseData.privacy === 'once' && surpriseData.opened) { showState('burned', 'เซอร์ไพรส์ถูกเปิดแล้ว', 'เซอร์ไพรส์นี้ตั้งค่าให้เปิดได้ครั้งเดียว และถูกเปิดไปแล้ว'); return; }

                // Update views
                const updates = { views: increment(1) };
                if (surpriseData.privacy === 'once') updates.opened = true;
                await updateDoc(docRef, updates);

                document.title = `เซอร์ไพรส์ถึง ${surpriseData.receiver} | Surprise Me`;
                showIntro();
            } catch(err) {
                console.error(err);
                showState('error', 'เกิดข้อผิดพลาด', err.message || 'ไม่สามารถโหลดเซอร์ไพรส์ได้ในขณะนี้');
            } finally {
                const ls = $('loading-screen');
                ls.classList.add('out');
                setTimeout(() => ls.remove(), 500);
            }
        }

        function showIntro() {
            const intro = $('intro-screen');
            const isLove = surpriseData.template === 'romantic' || surpriseData.template === 'anniversary' || surpriseData.template === 'proposal';
            const boxClass = isLove ? 'box-beat' : 'box-shake';
            
            intro.innerHTML = `
                <div class="envelope-box ${boxClass}" id="env-box" style="background:linear-gradient(135deg,${tpl.from},${tpl.to});" onclick="openSurprise()">
                    <span class="material-symbols-rounded" style="font-variation-settings:'FILL' 1;">${tpl.icon}</span>
                </div>
                <div class="intro-tag">เซอร์ไพรส์ถึง</div>
                <div class="intro-title">${escHtml(surpriseData.receiver)}</div>
                <div class="intro-from">จาก: ${escHtml(surpriseData.sender)}</div>
                <div class="tap-pill" onclick="openSurprise()">
                    <span class="material-symbols-rounded" style="font-size:1rem;">touch_app</span>
                    แตะเพื่อเปิดดู
                </div>
            `;
            intro.classList.add('show');
        }

        window.openSurprise = () => {
            const intro = $('intro-screen');
            intro.style.transition = 'all 0.35s ease';
            intro.style.opacity = '0';
            intro.style.transform = 'scale(0.95)';
            setTimeout(() => {
                intro.style.display = 'none';
                renderViewer();
                setTimeout(() => launchParticles(), 400);
            }, 350);
        };

        function renderViewer() {
            const viewer = $('viewer');
            const cardBg = `linear-gradient(160deg, rgba(20,20,20,0.8) 0%, rgba(10,10,10,0.9) 100%)`;
            const cardBorder = `1px solid ${tpl.from}44`;

            viewer.innerHTML = `
                <div class="view-card glass-card" id="tilt-card" data-tilt data-tilt-max="10" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.2" style="padding:0; background:${cardBg}; border:${cardBorder}; box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);">
                    <div style="height:5px; background:linear-gradient(to right,${tpl.from},${tpl.to});"></div>
                    <div class="view-card-inner">
                        <div class="view-tag" style="transform: translateZ(20px);">
                            <span class="material-symbols-rounded" style="font-size:0.9rem; color:${tpl.from}; font-variation-settings:'FILL' 1;">${tpl.icon}</span>
                            ${escHtml(tpl.nameTh)}
                        </div>
                        <div class="view-to" style="transform: translateZ(30px);">ถึง</div>
                        <div class="view-name" style="transform: translateZ(40px); background:linear-gradient(to right,${tpl.from},${tpl.to});-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${escHtml(surpriseData.receiver)}</div>
                        
                        <div class="view-message typewriter" id="msg-container" style="transform: translateZ(30px);"></div>
                        
                        <div class="view-from" id="msg-from" style="transform: translateZ(20px);">— ${escHtml(surpriseData.sender)}</div>
                        <div class="view-divider"></div>
                        <div class="view-meta" id="msg-meta">
                            ${surpriseData.analytics !== false ? `
                            <span class="view-count-badge">
                                <span class="material-symbols-rounded" style="font-size:0.8rem;">visibility</span>
                                ${(surpriseData.views || 0) + 1} ครั้ง
                            </span>` : '<span></span>'}
                            <a href="creator.html" class="create-own-btn">
                                <span class="material-symbols-rounded" style="font-size:0.9rem;">add_circle</span>
                                สร้างของคุณเอง
                            </a>
                        </div>
                    </div>
                </div>
                ${getInteractBtn()}
            `;
            viewer.classList.add('show');
            
            // Initialize 3D Tilt
            VanillaTilt.init(document.querySelector("#tilt-card"));

            // Typewriter effect
            const textToType = surpriseData.message;
            const msgContainer = $('msg-container');
            let i = 0;
            const typeSpeed = 40; // ms per char

            function typeWriter() {
                if (i < textToType.length) {
                    const char = textToType.charAt(i);
                    msgContainer.innerHTML += char === '\n' ? '<br>' : escHtml(char);
                    i++;
                    setTimeout(typeWriter, typeSpeed);
                } else {
                    msgContainer.classList.remove('typewriter');
                    $('msg-from').classList.add('show');
                    $('msg-meta').classList.add('show');
                }
            }
            // Delay start a bit after card shows
            setTimeout(typeWriter, 500);
        }

        function getInteractBtn() {
            if (surpriseData.template === 'birthday' || surpriseData.template === 'congrats' || surpriseData.template === 'newyear') {
                return `<button class="interact-btn" onclick="launchParticles(true)" style="border-color:${tpl.from}44; color:${tpl.from};">
                    <span class="material-symbols-rounded" style="font-variation-settings:'FILL' 1;">celebration</span> กดเพื่อฉลองอีกครั้ง!
                </button>`;
            }
            if (surpriseData.template === 'romantic' || surpriseData.template === 'proposal' || surpriseData.template === 'anniversary' || surpriseData.template === 'missyou') {
                return `<button class="interact-btn" onclick="launchParticles(true)" style="border-color:${tpl.from}44; color:${tpl.from};">
                    <span class="material-symbols-rounded" style="font-variation-settings:'FILL' 1;">favorite</span> ส่งหัวใจกลับ
                </button>`;
            }
            return '';
        }

        function launchParticles(repeat = false) {
            const type = tpl.particle;
            if (type === 'confetti' || surpriseData.template === 'birthday' || surpriseData.template === 'congrats') {
                const d = Date.now() + (repeat ? 3000 : 2000);
                (function f() {
                    confetti({ particleCount: 6, angle: 60, spread: 55, origin: { x: 0 }, colors: [tpl.from, tpl.to, '#fff'] });
                    confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1 }, colors: [tpl.from, tpl.to, '#fff'] });
                    if (Date.now() < d) requestAnimationFrame(f);
                })();
                return;
            }
            // CSS particles for hearts/stars/sparkles/snow/petals/bubbles
            const count = repeat ? 14 : 8;
            const shapes = {
                hearts: ['♥','♡'],
                stars: ['✦','✧','★'],
                sparkles: ['✦','∗','·'],
                snow: ['·','•','∘'],
                petals: ['✿','❀','꽃'],
                bubbles: ['○','◌','◦'],
            }[type] || ['·','✦'];

            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    spawnSingleParticle(shapes, Math.random() * window.innerWidth, window.innerHeight + 50, true);
                }, i * 120);
            }
        }

        function spawnSingleParticle(shapes, x, y, animated = false) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.textContent = shapes[Math.floor(Math.random() * shapes.length)];
            
            if (animated) {
                p.style.cssText = `
                    left:${x}px;
                    bottom:-50px;
                    font-size:${0.8 + Math.random() * 1.5}rem;
                    color:${Math.random() > 0.5 ? tpl.from : tpl.to};
                    animation-duration:${2 + Math.random() * 3}s;
                    opacity:0.9;
                `;
            } else {
                // Interactive spark from touch/click
                p.style.cssText = `
                    position: fixed; left:${x}px; top:${y}px;
                    font-size:${1 + Math.random() * 1.5}rem;
                    color:${Math.random() > 0.5 ? tpl.from : tpl.to};
                    transform: translate(-50%, -50%);
                    transition: transform 1s ease-out, opacity 1s ease-out;
                    opacity:1; pointer-events:none; z-index:9999;
                `;
                requestAnimationFrame(() => {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 40 + Math.random() * 80;
                    p.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(0)`;
                    p.style.opacity = '0';
                });
            }
            document.body.appendChild(p);
            setTimeout(() => p.remove(), animated ? 5000 : 1000);
        }

        // Global Touch/Click interactive particles
        document.body.addEventListener('pointerdown', (e) => {
            if (!$('viewer').classList.contains('show')) return;
            const type = tpl.particle;
            if (type === 'none' || type === 'confetti') return;
            const shapes = {
                hearts: ['♥','♡'], stars: ['✦','✧','★'], sparkles: ['✦','∗','·'],
                snow: ['·','•','∘'], petals: ['✿','❀','꽃'], bubbles: ['○','◌','◦'],
            }[type] || ['·','✦'];
            
            // Spawn 3-5 particles at pointer location
            const spawnCount = 3 + Math.floor(Math.random() * 3);
            for(let i=0; i<spawnCount; i++) {
                spawnSingleParticle(shapes, e.clientX, e.clientY, false);
            }
        });

        function showState(type, title, desc) {
            $('loading-screen').classList.add('out');
            setTimeout(() => $('loading-screen').remove(), 500);
            const icons = { 'burned': { icon: 'local_fire_department', color: '#FB923C' }, 'not-found': { icon: 'search_off', color: 'var(--text-muted)' }, 'error': { icon: 'error', color: '#F87171' } };
            const { icon, color } = icons[type] || icons['error'];
            $('intro-screen').innerHTML = `
                <div class="state-card">
                    <div class="state-icon"><span class="material-symbols-rounded" style="color:${color}; font-variation-settings:'FILL' 1;">${icon}</span></div>
                    <div class="state-title">${title}</div>
                    <div class="state-desc">${desc}</div>
                    <a href="index.html" class="btn-primary" style="display:inline-flex; align-items:center; gap:8px;">
                        <span class="material-symbols-rounded">home</span> กลับหน้าหลัก
                    </a>
                </div>
            `;
            $('intro-screen').classList.add('show');
        }

        function escHtml(s = '') {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
        }

        init();
    </script>
</body>
</html>
