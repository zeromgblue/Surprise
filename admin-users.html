<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการยศแอดมิน | Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { margin:0; padding:20px; box-sizing:border-box; }
        .admin-wrap { max-width:600px; margin:0 auto; }
        
        .adm-header { 
            display:flex; align-items:center; justify-content:space-between; 
            margin-bottom:30px; padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.08); 
        }
        .adm-title { font-size:1.5rem; font-weight:800; }
        .adm-title small { display:block; font-size:0.82rem; font-weight:400; color:var(--text-muted); margin-top:2px; }

        .glass-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 24px;
        }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.9rem; margin-bottom: 8px; color: var(--text-muted); }
        .form-input { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--primary); }

        .btn-grant {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-grant:disabled { opacity: 0.5; cursor: not-allowed; }

        .admin-list { margin-top: 30px; }
        .admin-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.02); padding: 12px 16px; border-radius: 14px; margin-bottom: 10px;
        }
        .admin-item-info { flex: 1; }
        .admin-uid { font-size: 0.75rem; color: var(--text-muted); font-family: monospace; }
        .btn-revoke {
            padding: 8px; border-radius: 8px; border: 1px solid rgba(248,113,113,0.2);
            background: rgba(248,113,113,0.1); color: #f87171; cursor: pointer;
        }

        #loading-overlay {
            position: fixed; inset: 0; background: rgba(8, 8, 8, 0.9);
            backdrop-filter: blur(15px); z-index: 9999;
            display: none; align-items: center; justify-content: center; flex-direction: column;
            gap: 24px;
        }
        .loader-ring { width: 50px; height: 50px; border-radius: 50%; border: 4px solid rgba(255,51,102,0.1); border-top: 4px solid #FF3366; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loader-ring"></div>
        <div style="color:white; font-weight:700;">กำลังดำเนินการ...</div>
    </div>

    <div class="admin-wrap">
        <div class="adm-header">
            <div class="adm-title">
                🛡️ จัดการยศแอดมิน
                <small>เพิ่มหรือถอนสิทธิ์ผู้ดูแลระบบ (Sub-Admin)</small>
            </div>
            <a href="dashboard.html" class="btn-secondary" style="padding:8px 16px; font-size:0.82rem;">
                <span class="material-symbols-rounded">dashboard</span> กลับ Dashboard
            </a>
        </div>

        <div class="glass-card">
            <div class="form-group">
                <label class="form-label">วาง User UID ที่ต้องการให้ยศ</label>
                <input type="text" id="target-uid" class="form-input" placeholder="ตัวอย่าง: qqzXIApGiHVh2r78spN1BeZ7Qzz2">
            </div>
            <button id="btn-grant" class="btn-grant">
                <span class="material-symbols-rounded">verified_user</span> ให้ยศแอดมิน
            </button>
            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 12px; line-height: 1.5;">
                * แอดมินจะสามารถเข้าใช้งานได้ทุกเทมเพลต (Extreme) แต่จะไม่เห็นหน้า "จัดการการเงิน"
            </p>
        </div>

        <div class="admin-list" id="admin-list">
            <h4 style="margin-bottom: 12px;">รายชื่อแอดมินทั้งหมด</h4>
            <div id="list-container">
                <!-- Data will be loaded here -->
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { collection, query, where, getDocs, doc, setDoc, deleteField, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const SUPER_ADMIN_UID = 'qqzXIApGiHVh2r78spN1BeZ7Qzz2';
        const overlay = document.getElementById('loading-overlay');
        const listContainer = document.getElementById('list-container');
        const targetInput = document.getElementById('target-uid');
        const grantBtn = document.getElementById('btn-grant');

        onAuthStateChanged(auth, (user) => {
            if (!user || user.uid !== SUPER_ADMIN_UID) {
                alert('คุณไม่มีสิทธิ์เข้าถึงหน้านี้');
                window.location.href = 'index.html';
                return;
            }
            loadAdmins();
        });

        async function loadAdmins() {
            listContainer.innerHTML = '<p style="color:var(--text-muted); font-size:0.9rem;">กำลังโหลด...</p>';
            try {
                const q = query(collection(db, 'users'), where('role', '==', 'admin'));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    listContainer.innerHTML = '<p style="color:var(--text-muted); font-size:0.9rem;">ยังไม่มีแอดมินท่านอื่น</p>';
                    return;
                }

                listContainer.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    const item = document.createElement('div');
                    item.className = 'admin-item';
                    item.innerHTML = `
                        <div class="admin-item-info">
                            <div style="font-weight:700; font-size:0.95rem;">${data.name || 'ไม่ทราบชื่อ'}</div>
                            <div class="admin-uid">${d.id}</div>
                        </div>
                        <button class="btn-revoke" onclick="revokeAdmin('${d.id}')">ถอนสิทธิ์</button>
                    `;
                    listContainer.appendChild(item);
                });
            } catch (e) {
                console.error(e);
                listContainer.innerHTML = '<p style="color:#f87171;">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
            }
        }

        grantBtn.onclick = async () => {
            const uid = targetInput.value.trim();
            if (!uid) return;
            if (uid === SUPER_ADMIN_UID) {
                alert('UID นี้เป็น Super Admin อยู่แล้ว');
                return;
            }

            overlay.style.display = 'flex';
            try {
                await setDoc(doc(db, 'users', uid), { 
                    role: 'admin',
                    tier: 'extreme' // แอดมินมักจะได้ Extreme อยู่แล้ว
                }, { merge: true });
                targetInput.value = '';
                alert('ให้ยศแอดมินเรียบร้อยแล้ว');
                loadAdmins();
            } catch (e) {
                alert('เกิดข้อผิดพลาด: ' + e.message);
            } finally {
                overlay.style.display = 'none';
            }
        };

        window.revokeAdmin = async (uid) => {
            if (!confirm('ยืนยันถอนสิทธิ์แอดมิน?')) return;
            overlay.style.display = 'flex';
            try {
                await updateDoc(doc(db, 'users', uid), { 
                    role: deleteField() 
                });
                loadAdmins();
            } catch (e) {
                alert('เกิดข้อผิดพลาด: ' + e.message);
            } finally {
                overlay.style.display = 'none';
            }
        };
    </script>
</body>
</html>
