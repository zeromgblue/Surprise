<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ดูตัวอย่าง | Surprise Me</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            background: var(--background);
        }

        /* Top bar */
        .preview-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .preview-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #FF3366, #9333EA);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .preview-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.82rem;
        }

        .preview-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .preview-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
        }

        .preview-btn-back {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .preview-btn-back:hover {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }

        .preview-btn-create {
            background: linear-gradient(135deg, #FF3366, #9333EA);
            color: white;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
        }

        .preview-btn-create:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 25px rgba(255, 51, 102, 0.6);
        }

        /* Content area with top padding for the bar */
        #preview-content {
            width: 100%;
            min-height: 100vh;
            padding-top: 56px;
            box-sizing: border-box;
        }

        /* Loading */
        #loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 9998;
            background: var(--background);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: opacity 0.5s ease;
        }

        #loading-overlay.out {
            opacity: 0;
            pointer-events: none;
        }

        .load-ring {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #FF3366;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Template name chip */
        .tpl-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.78rem;
            padding: 3px 10px;
            border-radius: 20px;
            max-width: 200px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .tpl-chip .material-symbols-rounded {
            font-size: 0.85rem;
            font-variation-settings: 'FILL' 1;
        }

        @media (max-width: 480px) {
            .preview-label {
                display: none;
            }

            .tpl-chip {
                max-width: 120px;
            }
        }
    </style>
</head>

<body>

    <!-- Preview Bar (always on top) -->
    <div class="preview-bar" id="previewBar">
        <div style="display:flex;align-items:center;gap:10px;">
            <span class="preview-badge">
                <span class="material-symbols-rounded" style="font-size:0.8rem;">visibility</span>
                ตัวอย่าง
            </span>
            <span class="tpl-chip" id="tplChip">
                <span class="material-symbols-rounded" id="tplIcon">auto_awesome</span>
                <span id="tplName">กำลังโหลด...</span>
            </span>
        </div>
        <div class="preview-label">นี่คือลักษณะที่ผู้รับจะเห็น</div>
        <div class="preview-actions">
            <button class="preview-btn preview-btn-back" onclick="history.back()">
                <span class="material-symbols-rounded" style="font-size:0.9rem;">arrow_back</span>
                กลับแก้ไข
            </button>
            <button class="preview-btn preview-btn-create" id="createBtn">
                <span class="material-symbols-rounded" style="font-size:0.9rem;">magic_button</span>
                สร้างลิงก์จริง
            </button>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading-overlay">
        <div class="load-ring"></div>
        <p style="color:var(--text-muted);font-size:0.85rem;">กำลังโหลดตัวอย่าง...</p>
    </div>

    <!-- Template renders here -->
    <div id="preview-content"></div>

    <script type="module">
        import { getTemplateById } from './templates-data.js';

        const params = new URLSearchParams(window.location.search);
        const tplId = params.get('tpl') || 'romantic';
        const receiver = params.get('receiver') || 'ผู้รับ';
        const message = params.get('message') || 'ข้อความทดสอบ ❤️';
        const sender = params.get('sender') || 'ผู้ส่ง';
        const privacy = params.get('privacy') || 'multi';
        const tier = params.get('tier') || 'free';

        const tpl = getTemplateById(tplId);
        const container = document.getElementById('preview-content');
        const loading = document.getElementById('loading-overlay');

        // Update chip in bar
        document.getElementById('tplIcon').textContent = tpl.icon;
        document.getElementById('tplName').textContent = tpl.nameTh;

        // Create button goes back to creator with all params pre-filled
        const createBtn = document.getElementById('createBtn');
        createBtn.addEventListener('click', () => {
            const p = new URLSearchParams({ tier, t: tplId });
            window.location.href = 'creator.html?' + p.toString();
        });

        // Fake surprise data for preview
        const previewData = {
            template: tplId,
            receiver: decodeURIComponent(receiver),
            message: decodeURIComponent(message),
            sender: decodeURIComponent(sender),
            privacy,
            views: 0,
            analytics: false,  // hide view count in preview
        };

        async function loadTemplate() {
            try {
                const folder = tpl.part ? `./templates_${tpl.part}` : './templates';
                const mod = await import(`${folder}/tpl-${tpl.id}.js`);
                await mod.render(container, previewData, tpl);
            } catch (e) {
                console.warn('Template JS not found, using classic fallback:', e.message);
                renderClassicFallback(container, previewData, tpl);
            } finally {
                loading.classList.add('out');
                setTimeout(() => loading.remove(), 500);
            }
        }

        function renderClassicFallback(el, data, t) {
            el.style.cssText = 'display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:20px;box-sizing:border-box;';
            el.innerHTML = `
                <div style="max-width:540px;width:100%;">
                    <div style="border-radius:24px;overflow:hidden;background:linear-gradient(160deg,rgba(20,20,20,0.8),rgba(10,10,10,0.9));border:1px solid ${t.from}44;box-shadow:0 20px 50px rgba(0,0,0,0.5);">
                        <div style="height:5px;background:linear-gradient(to right,${t.from},${t.to});"></div>
                        <div style="padding: 24px 20px;">
                            <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;opacity:0.6;margin-bottom:16px;display:flex;align-items:center;gap:6px;">
                                <span class="material-symbols-rounded" style="font-size:0.9rem;color:${t.from};font-variation-settings:'FILL' 1;">${t.icon}</span>
                                ${escHtml(t.nameTh)}
                            </div>
                            <div style="font-size:0.82rem;opacity:0.6;margin-bottom:6px;">ถึง</div>
                            <div style="font-size:1.8rem;font-weight:800;font-family:'Outfit',sans-serif;margin-bottom:24px;background:linear-gradient(to right,${t.from},${t.to});-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;word-wrap:break-word;">${escHtml(data.receiver)}</div>
                            <div style="font-size:1rem;line-height:1.7;white-space:pre-wrap;word-break:break-word;">${escHtml(data.message)}</div>
                            <div style="font-weight:700;font-size:0.9rem;margin-top:28px;opacity:0.7;">— ${escHtml(data.sender)}</div>
                        </div>
                    </div>
                    <div style="text-align:center;margin-top:20px;">
                        <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,51,102,0.1);border:1px solid rgba(255,51,102,0.3);color:#FF3366;padding:8px 16px;border-radius:10px;font-size:0.8rem;">
                            <span class="material-symbols-rounded" style="font-size:0.9rem;">info</span>
                            เทมเพลตนี้ใช้ Classic Fallback — เวอร์ชัน 3D จะทำงานเมื่อ deploy จริง
                        </div>
                    </div>
                </div>
            `;
        }

        function escHtml(s = '') {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        loadTemplate();
    </script>
</body>

</html>
